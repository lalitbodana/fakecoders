<div class="container">
    
    <form #myform = "ngForm" (ngSubmit) = "onSubmit(myform)" class="row g-3">
          <div class="col-md-6">
            <input type="text" name ="firstName" class="form-control" placeholder="First name" aria-label="First name" ngModel> 
          </div>
          <div class="col-md-6">
            <input type="text" name ="lastName" class="form-control" placeholder="Last name" aria-label="Last name" ngModel>
          </div>
      <div class="col-md-6">
        <label for="inputEmail4" class="form-label">Email</label>
        <input type="email" name ="email" class="form-control" id="inputEmail4" ngModel>
      </div>
      <div class="col-md-6">
        <label for="inputPassword4" class="form-label">Password</label>
        <input type="password" name ="password" class="form-control" id="inputPassword4" ngModel>
      </div>
      <div class="col-12">
        <label for="inputAddress" class="form-label">Address</label>
        <input type="text" name ="address1" class="form-control" id="inputAddress" placeholder="1234 Main St" ngModel>
      </div>
      <div class="col-12">
        <label for="inputAddress2" class="form-label">Address 2</label>
        <input type="text" name ="address2" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor" ngModel>
      </div>
      <!-- <div class="col-md-6">
        <label for="inputCity" class="form-label">City</label>
        <input type="text" class="form-control" id="inputCity">
      </div>
      <div class="col-md-4">
        <label for="inputState" class="form-label">State</label>
        <select id="inputState" class="form-select">
          <option selected>Choose...</option>
          <option>...</option>
        </select>
      </div>
      <div class="col-md-2">
        <label for="inputZip" class="form-label">Zip</label>
        <input type="text" class="form-control" id="inputZip">
      </div> -->
          <div class="col-sm-6">
              <label for="inputCity" class="form-label">City</label>
            <input type="text" name ="city" class="form-control" placeholder="City" aria-label="City" ngModel>
          </div>
          <div class="col-sm">
              <label for="inputState" class="form-label">State</label>
            <input type="text" name ="state" class="form-control" placeholder="State" aria-label="State" ngModel>
          </div>
          <div class="col-sm">
              <label for="inputZip" class="form-label">Zip</label>
            <input type="text" name ="zip" class="form-control" placeholder="Zip" aria-label="Zip" ngModel>
          </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" name ="checked" type="checkbox" id="gridCheck" ngModel>
          <label class="form-check-label" for="gridCheck">
            Check me out
          </label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary" value = "Send">Sign in</button>
      </div>
    </form>
</div>
